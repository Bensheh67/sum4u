<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>总结音视频 — summary4u</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/desktop.css" />
  <style>
    /* ── Popover-specific tokens ─────────────────────────────── */
    :root {
      --popover-w: 480px;
      --popover-h: 280px;
    }

    /* ── Popover shell ───────────────────────────────────────── */
    .popover {
      width: var(--popover-w);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: var(--r-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.04);
      overflow: hidden;
      animation: popover-in 150ms var(--ease-out) both;
    }

    @keyframes popover-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes popover-out {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.96); }
    }

    .popover.closing {
      animation: popover-out 200ms var(--ease-in) both;
    }

    /* ── Popover header ──────────────────────────────────────── */
    .popover-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
    }
    .popover-header__title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 600;
      color: var(--color-text);
      display: flex; align-items: center; gap: 6px;
    }
    .popover-header__title-icon {
      color: var(--color-primary);
      font-size: 16px;
    }
    .popover-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none;
      border-radius: var(--r-sm);
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background var(--dur-micro) var(--ease-out),
                  color var(--dur-micro) var(--ease-out);
    }
    .popover-close:hover { background: var(--color-surface-hover); color: var(--color-text); }

    /* ── Popover body ───────────────────────────────────────── */
    .popover-body {
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* URL input */
    .popover-url-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .popover-url-icon {
      position: absolute; left: 12px;
      width: 18px; height: 18px;
      color: var(--color-text-muted);
      pointer-events: none;
    }
    .popover-url-input {
      width: 100%;
      height: 44px;
      padding: 0 12px 0 40px;
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color var(--dur-short) var(--ease-out),
                  box-shadow var(--dur-short) var(--ease-out);
      -webkit-appearance: none;
    }
    .popover-url-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
      background: var(--color-bg);
    }
    .popover-url-input::placeholder { color: var(--color-text-muted); }

    /* Options row */
    .popover-options {
      display: flex; gap: 8px; align-items: center;
    }
    .popover-select {
      flex: 1;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--color-text);
      background: var(--color-surface);
      cursor: pointer;
    }
    .popover-select:focus { outline: none; border-color: var(--color-primary); }

    /* Buttons row */
    .popover-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      padding-top: 4px;
    }
    .btn-cancel {
      height: 36px;
      padding: 0 14px;
      background: transparent;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background var(--dur-micro) var(--ease-out);
    }
    .btn-cancel:hover { background: var(--color-surface-hover); }

    .btn-submit {
      height: 36px;
      padding: 0 16px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background var(--dur-micro) var(--ease-out);
    }
    .btn-submit:hover:not(:disabled) { background: var(--color-primary-hover); }
    .btn-submit:disabled { background: var(--color-border-strong); cursor: not-allowed; }

    /* ── Dark mode ───────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      .popover { background: rgba(30,41,59,0.95); }
    }

    /* ── Reduced motion ─────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .popover, .popover.closing { animation: none; }
    }
  </style>
</head>
<body>
<div class="popover" id="popover">

  <!-- Header -->
  <div class="popover-header">
    <div class="popover-header__title">
      <span class="popover-header__title-icon">✦</span>
      总结音视频
    </div>
    <button class="popover-close" id="closeBtn" aria-label="关闭">✕</button>
  </div>

  <!-- Body -->
  <div class="popover-body">
    <div class="popover-url-wrap">
      <svg class="popover-url-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <input
        type="text"
        id="popoverUrlInput"
        class="popover-url-input"
        placeholder="输入 YouTube/B站/抖音链接..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="popover-options">
      <select class="popover-select" id="popoverTemplate" aria-label="选择模板">
        <option value="default">📚 课堂笔记</option>
        <option value="youtube_structured">📝 结构化提取</option>
        <option value="youtube_bullet">💡 精炼提取</option>
        <option value="youtube_course">🎓 专业课笔记</option>
        <option value="short_video">🎬 爆款短视频文案</option>
      </select>
      <select class="popover-select" id="popoverModel" aria-label="选择模型" style="flex:0 0 100px;">
        <option value="small">small</option>
        <option value="base">base</option>
        <option value="medium">medium</option>
      </select>
    </div>

    <div class="popover-actions">
      <button class="btn-cancel" id="cancelBtn">取消</button>
      <button class="btn-submit" id="popoverSubmit" disabled>
        ✨ 开始总结
      </button>
    </div>
  </div>
</div>

<script src="/static/js/desktop_popover.js"></script>
</body>
</html>
