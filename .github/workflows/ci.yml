name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e '.[test]'

      - name: Run ruff check with auto-fix
        run: |
          ruff check src/ --fix || true

      - name: Check Python syntax
        run: |
          python -m py_compile src/*.py

      - name: Verify imports
        run: |
          python -c "
          import src.main
          import src.audio
          import src.video
          import src.config
          print('All imports successful')
          "

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --ignore-glob="**/.venv/**"